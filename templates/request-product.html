{% extends "base.html" %}
{% block title %}Request a Product - South Cart{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-12 max-w-lg">
    <div class="bg-white rounded-lg shadow p-8">
        <h1 class="text-2xl font-bold text-center mb-4">Request a Product</h1>
        <p class="text-center text-gray-600 mb-6">Don't see what you're looking for? Let us know and we'll try to source it from Uganda.</p>
        <form method="post">
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">Your Name</label>
                <input type="text" name="name" required class="w-full border rounded-lg px-3 py-2">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" name="email" required class="w-full border rounded-lg px-3 py-2">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">Product Name</label>
                <input type="text" name="product_name" required class="w-full border rounded-lg px-3 py-2">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">Description (brand, size, color, etc.)</label>
                <textarea name="description" rows="4" class="w-full border rounded-lg px-3 py-2"></textarea>
            </div>
            <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-full hover:bg-green-700">Submit Request</button>
        </form>
    </div>
</div>
{% endblock %}
