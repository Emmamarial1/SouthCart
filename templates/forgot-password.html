{% extends "base.html" %}
{% block title %}Reset Password - South Cart{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-8 bg-gradient-to-br from-green-50 to-white">
    <div class="max-w-md w-full animate-fade-in-up">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="h-2 bg-gradient-to-r from-green-600 to-green-400"></div>
            <div class="p-6">
                <div class="text-center mb-5">
                    <div class="mx-auto w-14 h-14 bg-green-100 rounded-full flex items-center justify-center mb-3">
                        <i class="lucide-key text-green-600" style="width: 26px;"></i>
                    </div>
                    <h2 class="text-xl font-bold text-gray-800">Reset Password</h2>
                    <p class="text-gray-500 text-xs mt-1">Enter your phone number and new password</p>
                </div>

                <form method="post" class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Phone Number</label>
                        <input type="tel" name="phone" required 
                               class="w-full px-3 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent transition bg-gray-50 focus:bg-white"
                               placeholder="+211 912 345 678">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">New Password</label>
                        <input type="password" name="new_password" required 
                               class="w-full px-3 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent transition bg-gray-50 focus:bg-white"
                               placeholder="••••••••">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Confirm New Password</label>
                        <input type="password" name="confirm_password" required 
                               class="w-full px-3 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent transition bg-gray-50 focus:bg-white"
                               placeholder="••••••••">
                    </div>
                    <button type="submit" 
                            class="w-full bg-gradient-to-r from-green-600 to-green-500 hover:from-green-700 hover:to-green-600 text-white font-semibold py-2 rounded-xl transition shadow-md">
                        Reset Password
                    </button>
                </form>

                <div class="mt-5 text-center">
                    <p class="text-xs text-gray-600">
                        Remembered your password? 
                        <a href="/login" class="text-green-600 font-semibold hover:underline">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
